# ---------------------------------------------------------------------------
# JUL configuration for concurrency module unit tests
#
# System.Logger uses JUL as its backend by default.  This file configures
# a single ConsoleHandler on the root logger so that every log message
# written during a test run also appears on stderr (the console in Maven
# and in your IDE's test output pane).
#
# The CapturingHandler (installed by HandlerManager at test runtime) runs
# alongside this ConsoleHandler: both receive every log record.
# ---------------------------------------------------------------------------

# Root handler(s) ? a single ConsoleHandler writes to stderr
handlers = java.util.logging.ConsoleHandler

# Let all levels through at the root; individual loggers are narrowed
# programmatically by SystemLogVerifier when a test calls configure(...)
.level = ALL

# ConsoleHandler: accept everything and use our custom formatter below.
# TestLogFormatter translates JUL level names to System.Logger names
# (e.g. FINER ? TRACE, FINE ? DEBUG, SEVERE ? ERROR) and suppresses
# noise from JVM-internal loggers (java.*, javax.*, sun.*, jdk.*).
java.util.logging.ConsoleHandler.level     = ALL
java.util.logging.ConsoleHandler.formatter = software.frisby.core.concurrency.log.TestLogFormatter


