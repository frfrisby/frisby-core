name: Publish to Maven Central

on:
  # Triggered automatically by release-please when it creates a GitHub Release.
  release:
    types: [ published ]
  # Called directly from release-please.yml to work around the GitHub limitation
  # that prevents GITHUB_TOKEN-created releases from triggering release events.
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 with Central Portal credentials
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          # Writes a <server id="central"> entry into ~/.m2/settings.xml.
          # central-publishing-maven-plugin picks this up via publishingServerId=central.
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          # Imports the GPG key so maven-gpg-plugin can sign artifacts.
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set release version (strip -SNAPSHOT suffix)
        run: mvn --batch-mode --no-transfer-progress versions:set -DremoveSnapshot -DgenerateBackupPoms=false

      - name: Build, sign and stage all modules
        # -DskipPublishing=true stages every module's artifacts into the shared
        # target/central-staging directory without uploading anything to Central Portal.
        # Running publish per-module would create overlapping deployments because the
        # staging directory accumulates artifacts across the reactor build.
        run: mvn --batch-mode --no-transfer-progress -P release deploy -DskipPublishing=true
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish staged bundle to Maven Central
        # --non-recursive runs only on the root module, uploading the single combined
        # bundle that was accumulated in target/central-staging by the step above.
        run: mvn --batch-mode --no-transfer-progress -P release central-publishing:publish --non-recursive
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
